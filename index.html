<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#9a1818" />
    <title>E夜暴富 · 画符灵签</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <span class="hero-title">E夜暴富</span>
        <span class="hero-sub">画符求签 · 导师灵签</span>
      </header>

      <section class="panel panel--draw">
        <span class="theme-bar-title">请选择你喜欢的主题</span>
        <div id="themeBar" class="theme-bar" aria-label="主题筛选"></div>

        <div class="talisman-frame">
          <div id="canvasWrap">
            <canvas id="talismanCanvas" class="talisman-canvas" aria-label="画符区域"></canvas>
          </div>
          <div id="talismanPlaceholder" class="talisman-placeholder" hidden></div>
        </div>

        <p class="hint">在纸上画符求签</p>
        <div class="draw-actions">
          <button type="button" class="btn btn--ghost" id="btnClear">重画</button>
          <button type="button" class="btn btn--gold" id="btnOpen" disabled>开签</button>
        </div>
      </section>
    </div>

    <div id="resultMask" class="mask" hidden role="dialog" aria-modal="true" aria-labelledby="cardKicker">
      <div class="card">
        <span id="cardKicker" class="card-kicker">今日灵签</span>
        <p id="cardQuote" class="card-quote"></p>
        <div class="card-meta">
          <span id="cardMentor" class="card-mentor"></span>
        </div>
        <button type="button" class="btn-card-action" id="btnAgain">
          <span class="btn-card-line">收下吉言</span>
          <span class="btn-card-line">再求一签</span>
        </button>
      </div>
    </div>

    <script src="./quotes.js"></script>
    <script src="./app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </body>
</html>
